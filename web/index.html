<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1.00001,viewport-fit=cover"
    />
    <title>Wi-Fi Калуга</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/assets/images/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/images/icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0065FF" />
    <meta name="description" content="Найдите бесплатные Wi-Fi точки в Калуге" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WiFi КЛГ" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="Wi-Fi Калуга" />
    <meta property="og:description" content="Найдите бесплатные Wi-Fi точки в Калуге" />
    <meta property="og:type" content="website" />

    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #f0f2f5;
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
      }

      /* ── Preloader ── */
      #preloader {
        position: fixed;
        inset: 0;
        background: linear-gradient(150deg, #0055DD 0%, #0065FF 50%, #0080FF 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
        user-select: none;
        -webkit-user-select: none;
      }
      #preloader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      /* Logo at top */
      .pl-logo {
        width: 72px;
        height: 72px;
        background: rgba(255,255,255,0.15);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 36px;
        flex-shrink: 0;
      }
      .pl-logo svg {
        width: 44px;
        height: 44px;
      }

      /* Slides container */
      .pl-slides {
        position: relative;
        width: 280px;
        height: 200px;
        flex-shrink: 0;
      }
      .pl-slide {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        opacity: 0;
        transform: translateY(12px) scale(0.97);
        transition: opacity 0.45s ease, transform 0.45s ease;
        pointer-events: none;
      }
      .pl-slide.active {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }
      .pl-slide-icon {
        width: 80px;
        height: 80px;
        background: rgba(255,255,255,0.12);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pl-slide-icon svg {
        width: 44px;
        height: 44px;
      }
      .pl-slide-text {
        color: white;
        font-size: 17px;
        font-weight: 600;
        text-align: center;
        line-height: 1.4;
        letter-spacing: -0.2px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .pl-slide-sub {
        color: rgba(255,255,255,0.65);
        font-size: 13px;
        font-weight: 400;
        text-align: center;
        line-height: 1.4;
        margin-top: -12px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      /* Dots */
      .pl-dots {
        display: flex;
        gap: 7px;
        margin-top: 32px;
        flex-shrink: 0;
      }
      .pl-dot {
        width: 6px;
        height: 6px;
        border-radius: 3px;
        background: rgba(255,255,255,0.3);
        transition: width 0.35s ease, background 0.35s ease;
      }
      .pl-dot.active {
        width: 20px;
        background: rgba(255,255,255,0.9);
      }

      /* App name footer */
      .pl-footer {
        position: absolute;
        bottom: 36px;
        left: 0; right: 0;
        text-align: center;
        color: rgba(255,255,255,0.5);
        font-size: 12px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        letter-spacing: 0.3px;
      }

      /* WiFi pulse animation on logo */
      @keyframes wifiPulse {
        0%   { opacity: 0.4; transform: scale(0.92); }
        50%  { opacity: 1;   transform: scale(1); }
        100% { opacity: 0.4; transform: scale(0.92); }
      }
      .pl-logo-inner {
        animation: wifiPulse 2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <!-- ── Preloader ── -->
    <div id="preloader">
      <!-- Animated WiFi logo -->
      <div class="pl-logo">
        <div class="pl-logo-inner">
          <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="22" cy="32" r="3.5" fill="white"/>
            <path d="M14 24 Q22 15 30 24" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
            <path d="M7 17 Q22 4 37 17" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
          </svg>
        </div>
      </div>

      <!-- Cycling slides -->
      <div class="pl-slides">

        <!-- Slide 1: Map -->
        <div class="pl-slide active" id="pl-slide-0">
          <div class="pl-slide-icon">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 6C16.477 6 12 10.477 12 16c0 8.25 10 22 10 22s10-13.75 10-22c0-5.523-4.477-10-10-10z" fill="white" opacity="0.9"/>
              <circle cx="22" cy="16" r="4" fill="#0065FF"/>
            </svg>
          </div>
          <div class="pl-slide-text">Всё на одной карте</div>
          <div class="pl-slide-sub">Найдите Wi-Fi рядом с вами</div>
        </div>

        <!-- Slide 2: WiFi signal -->
        <div class="pl-slide" id="pl-slide-1">
          <div class="pl-slide-icon">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="22" cy="34" r="3.5" fill="white"/>
              <path d="M13 25 Q22 15 31 25" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
              <path d="M6 18 Q22 4 38 18" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.6"/>
            </svg>
          </div>
          <div class="pl-slide-text">Бесплатный интернет</div>
          <div class="pl-slide-sub">В кафе, ресторанах, библиотеках</div>
        </div>

        <!-- Slide 3: Key/Password -->
        <div class="pl-slide" id="pl-slide-2">
          <div class="pl-slide-icon">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="16" cy="20" r="8" stroke="white" stroke-width="3.5" fill="none"/>
              <circle cx="16" cy="20" r="3" fill="white" opacity="0.7"/>
              <path d="M22 23 L36 23 L36 28 M30 23 L30 27" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="pl-slide-text">Пароли под рукой</div>
          <div class="pl-slide-sub">Копируйте одним нажатием</div>
        </div>

        <!-- Slide 4: Community check -->
        <div class="pl-slide" id="pl-slide-3">
          <div class="pl-slide-icon">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="14" cy="18" r="6" stroke="white" stroke-width="3" fill="none"/>
              <circle cx="30" cy="18" r="6" stroke="white" stroke-width="3" fill="none" opacity="0.6"/>
              <path d="M6 36c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
              <path d="M22 36c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
            </svg>
          </div>
          <div class="pl-slide-text">Проверено сообществом</div>
          <div class="pl-slide-sub">Голосуйте за точность данных</div>
        </div>
      </div>

      <!-- Indicator dots -->
      <div class="pl-dots">
        <div class="pl-dot active" id="pl-dot-0"></div>
        <div class="pl-dot" id="pl-dot-1"></div>
        <div class="pl-dot" id="pl-dot-2"></div>
        <div class="pl-dot" id="pl-dot-3"></div>
      </div>

      <div class="pl-footer">Wi-Fi Калуга · Калужская область</div>
    </div>
    <!-- ── End Preloader ── -->

    <div id="root"></div>

    <script>
      // ── Preloader cycling logic ──
      (function () {
        var total = 4;
        var current = 0;
        var interval = null;

        function goTo(idx) {
          var prev = current;
          current = idx;
          var prevSlide = document.getElementById('pl-slide-' + prev);
          var nextSlide = document.getElementById('pl-slide-' + current);
          var prevDot   = document.getElementById('pl-dot-' + prev);
          var nextDot   = document.getElementById('pl-dot-' + current);
          if (prevSlide) prevSlide.classList.remove('active');
          if (nextSlide) nextSlide.classList.add('active');
          if (prevDot)   prevDot.classList.remove('active');
          if (nextDot)   nextDot.classList.add('active');
        }

        interval = setInterval(function () {
          goTo((current + 1) % total);
        }, 2200);

        window.hideWebPreloader = function () {
          if (interval) { clearInterval(interval); interval = null; }
          var el = document.getElementById('preloader');
          if (!el) return;
          el.classList.add('fade-out');
          setTimeout(function () {
            if (el && el.parentNode) el.parentNode.removeChild(el);
          }, 550);
        };
      })();

      // ── Service Worker ──
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(function (reg) { console.log('SW registered:', reg.scope); })
            .catch(function (err) { console.log('SW error:', err); });
        });
      }
    </script>
  </body>
</html>
