<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1.00001,viewport-fit=cover"
    />
    <title>Wi-Fi Калуга</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0065FF" />
    <meta name="description" content="Найдите бесплатные Wi-Fi точки в Калуге" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WiFi КЛГ" />
    <link rel="apple-touch-icon" href="/assets/images/icon.png" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="Wi-Fi Калуга" />
    <meta property="og:description" content="Найдите бесплатные Wi-Fi точки в Калуге" />
    <meta property="og:type" content="website" />

    <!-- Leaflet for web map -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #0a1628;
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
      }
      .leaflet-container {
        font-family: -apple-system, 'Inter', sans-serif;
      }
      .wifi-popup .leaflet-popup-content-wrapper {
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.18);
        padding: 0;
      }
      .wifi-popup .leaflet-popup-content {
        margin: 0;
        padding: 14px 16px;
        min-width: 200px;
      }
      .wifi-popup .leaflet-popup-tip-container {
        margin-top: -1px;
      }
      .wifi-spot-btn {
        background: #0065FF;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 8px 0;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        margin-top: 8px;
        transition: opacity 0.15s;
      }
      .wifi-spot-btn:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
