<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1.00001,viewport-fit=cover"
    />
    <title>Wi-Fi Калуга</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0065FF" />
    <meta name="description" content="Найдите бесплатные Wi-Fi точки в Калуге" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WiFi КЛГ" />
    <link rel="apple-touch-icon" href="/assets/images/icon.png" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="Wi-Fi Калуга" />
    <meta property="og:description" content="Найдите бесплатные Wi-Fi точки в Калуге" />
    <meta property="og:type" content="website" />

    <!-- Leaflet CSS (OpenStreetMap) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background: #f8f9fa;
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
      }
      /* Leaflet fixes */
      .leaflet-container {
        font-family: -apple-system, 'Inter', sans-serif;
        height: 100%;
        width: 100%;
      }
      .leaflet-control-attribution {
        font-size: 9px !important;
        background: rgba(255,255,255,0.75) !important;
      }
      /* Hide default zoom (we use custom buttons) */
      .leaflet-control-zoom { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
